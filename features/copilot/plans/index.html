<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Complete all - Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f4f6;
    --panel:#ffffff;
    --muted:#9aa0a6;
    --green1:#00c853;
    --green2:#00a86b;
    --shadow: 0 8px 18px rgba(23,35,42,0.06);
  }
  *{box-sizing:border-box}
  body{
    font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
    background: linear-gradient(180deg,#f7f8f9,#eef1f3);
    margin:0;
    padding:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    color:#222;
  }
  .card{
    width:420px;
    background:var(--panel);
    border-radius:28px;
    padding:36px;
    box-shadow: 0 12px 30px rgba(15,20,25,0.06);
    border: 1px solid rgba(0,0,0,0.03);
  }
  h1{
    margin:0;
    font-size:40px;
    font-weight:800;
    letter-spacing: -0.02em;
    text-align:center;
  }
  p.lead{
    margin:10px 0 26px;
    color:var(--muted);
    text-align:center;
    font-size:16px;
    font-weight:500;
  }

  .btns{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-bottom:20px;
  }

  .action-btn{
    --h:64px;
    height:var(--h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:0 22px;
    border-radius:14px;
    background: linear-gradient(180deg, rgba(18,189,116,1), rgba(0,160,107,1));
    color:white;
    font-weight:700;
    font-size:18px;
    box-shadow: 0 12px 0 rgba(0,0,0,0.07), 0 6px 14px rgba(0,0,0,0.06);
    border: 3px solid rgba(0,0,0,0.06);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .12s ease, filter .12s ease;
  }
  .action-btn:active{ transform:translateY(1px) }
  .left-dot{
    width:52px;height:52px;border-radius:50%;
    background: rgba(255,255,255,0.12);
    display:flex;align-items:center;justify-content:center;
    margin-right:8px; flex:0 0 52px;
    box-shadow: inset 0 6px 18px rgba(255,255,255,0.04);
  }
  .left-dot .dot{
    width:18px;height:18px;border-radius:50%;background:white;opacity:0.95;
  }
  .btn-content{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .arrow{
    width:24px; height:24px; margin-left:12px;
    display:flex; align-items:center; justify-content:center;
    opacity:0.9;
  }
  .btn-completed{
    background: linear-gradient(180deg,#d8f0e0,#bff0d2);
    color: #0a4b2f;
    box-shadow: none;
    border: 1px solid rgba(10,75,47,0.08);
  }
  .btn-disabled{
    filter:grayscale(0.25) brightness(0.95);
    opacity:0.55;
    cursor:not-allowed;
    transform:none!important;
  }
  .small-note{font-size:13px;color:rgba(0,0,0,0.45); text-align:center; margin-bottom:18px}

  .progress-wrap{ margin:6px 12px 18px; text-align:center }
  .progress-title{ font-weight:700; color:#6b6b6b; font-size:20px; margin-bottom:10px}
  .progress-bar{
    height:14px;background:rgba(0,0,0,0.05); border-radius:10px; overflow:hidden;
  }
  .progress-inner{ height:100%; width:0%; background:linear-gradient(90deg,#9be7c7,#3dd59a); transition:width .4s ease;}

  .final-btn{
    margin-top:22px;
    width:100%;
    height:64px;
    border-radius:14px;
    border:2px solid rgba(0,0,0,0.12);
    background:linear-gradient(180deg,#f0f0f0,#e6e6e6);
    color:#fff; /* we'll style text color inside */
    font-weight:700;
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    gap:12px;
    cursor:not-allowed;
    color: rgba(255,255,255,0.85);
    position:relative;
  }
  .final-btn.enabled{
    background: linear-gradient(180deg,#ffffff,#f3f3f3);
    cursor:pointer;
    color:#222;
    box-shadow: 0 6px 14px rgba(0,0,0,0.06);
  }
  .final-btn .lock{
    position:absolute; left:18px; opacity:0.35;
  }

  .countdown {
    font-size:14px;
    margin-left:8px;
    opacity:0.95;
    font-weight:600;
  }

  /* small responsive */
  @media (max-width:480px){
    .card{ width:92%; padding:22px }
    h1{ font-size:28px }
  }
</style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <h1 id="title">Complete all</h1>
    <p class="lead">See an ad → return here until all is complete!</p>

    <div class="btns" id="btns">
      <button class="action-btn" data-index="0" id="btn-0" aria-live="polite">
        <div style="display:flex;align-items:center">
          <div class="left-dot"><div class="dot"></div></div>
          <div class="btn-content" id="label-0">Click, wait 10s, then return</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="countdown" id="cd-0" aria-hidden="true"></div>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5l8 7-8 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="action-btn" data-index="1" id="btn-1" aria-live="polite">
        <div style="display:flex;align-items:center">
          <div class="left-dot"><div class="dot"></div></div>
          <div class="btn-content" id="label-1">Click, wait 10s, then return</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="countdown" id="cd-1" aria-hidden="true"></div>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5l8 7-8 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button class="action-btn" data-index="2" id="btn-2" aria-live="polite">
        <div style="display:flex;align-items:center">
          <div class="left-dot"><div class="dot"></div></div>
          <div class="btn-content" id="label-2">Click, wait 10s, then return</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="countdown" id="cd-2" aria-hidden="true"></div>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5l8 7-8 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
    </div>

    <div class="progress-wrap">
      <div class="progress-title">Unlock Progress <span id="progress-text">0/3</span></div>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-inner" id="progress-inner"></div>
      </div>
    </div>

    <button id="final-btn" class="final-btn" aria-disabled="true" title="Click here once finished to get all videos">
      <svg class="lock" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 10V8a6 6 0 0112 0v2" stroke="#666" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="10" width="16" height="10" rx="2" stroke="#666" stroke-width="1.6" /></svg>
      <span id="final-label">Click here once finished to get all videos</span>
    </button>
  </div>

<script>
(function(){
  // Configuration
  const COOLDOWN_SECONDS = 10;
  const FAILURE_RATE = 0.15; // 15% fail
  const GOOGLE_BASE = 'https://www.google.com/search?q=ad+variant+';
  const FINAL_URL = 'https://skibidi.com';

  // pool of possible labels (you can add more)
  const LABEL_POOL = [
    'Click, wait 10s, then return',
    'Watch ad — wait 10s & comeback',
    'Tap here, wait 10s, then return',
    'See an ad → return here until complete',
    'Open ad, wait 10s, then come back'
  ];

  const state = [
    { completed:false, disabled:false },
    { completed:false, disabled:false },
    { completed:false, disabled:false }
  ];

  // assign 3 unique labels randomly from pool
  function assignLabels(){
    const copy = LABEL_POOL.slice();
    for(let i=0;i<3;i++){
      const idx = Math.floor(Math.random()*copy.length);
      const label = copy.splice(idx,1)[0];
      document.getElementById('label-'+i).textContent = label;
    }
  }

  assignLabels();

  // Helpers
  function updateProgress(){
    const done = state.filter(s=>s.completed).length;
    const pct = Math.round((done/3)*100);
    document.getElementById('progress-text').textContent = done + '/3';
    document.getElementById('progress-inner').style.width = pct + '%';
    // toggle final button
    const final = document.getElementById('final-btn');
    if(done === 3){
      final.classList.add('enabled');
      final.setAttribute('aria-disabled','false');
      final.style.cursor = 'pointer';
      // make focusable
    } else {
      final.classList.remove('enabled');
      final.setAttribute('aria-disabled','true');
      final.style.cursor = 'not-allowed';
    }
  }

  function setButtonAsCompleted(i){
    const btn = document.getElementById('btn-'+i);
    btn.classList.add('btn-completed');
    btn.classList.add('btn-disabled');
    btn.setAttribute('aria-disabled','true');
    state[i].completed = true;
    state[i].disabled = true;
    document.getElementById('cd-'+i).textContent = '';
    updateProgress();
  }

  function setButtonDisabled(i, disabled){
    const btn = document.getElementById('btn-'+i);
    state[i].disabled = disabled;
    if(disabled){
      btn.classList.add('btn-disabled');
      btn.setAttribute('aria-disabled','true');
    } else {
      if(!state[i].completed) btn.classList.remove('btn-disabled');
      btn.setAttribute('aria-disabled','false');
    }
  }

  function openGoogleForVariant(i){
    // open google in new tab with variant id so it's "random" each button press
    const label = encodeURIComponent(document.getElementById('label-'+i).textContent.replace(/\s+/g,'+') );
    const url = GOOGLE_BASE + (i+1) + '+' + label;
    try{
      window.open(url, '_blank');
    }catch(e){
      // ignore
    }
  }

  // click handler
  function onActionClick(e){
    const btn = e.currentTarget;
    const i = Number(btn.dataset.index);
    if(state[i].completed) return;
    if(state[i].disabled) return;

    // immediately open google (regardless of location)
    openGoogleForVariant(i);

    // start cooldown
    setButtonDisabled(i, true);
    let remaining = COOLDOWN_SECONDS;
    const cdEl = document.getElementById('cd-'+i);
    cdEl.textContent = remaining + 's';
    const interval = setInterval(()=>{
      remaining--;
      if(remaining > 0){
        cdEl.textContent = remaining + 's';
      } else {
        cdEl.textContent = '';
        clearInterval(interval);
        // determine success/failure
        const r = Math.random();
        if(r < FAILURE_RATE){
          // failed -> re-enable for trying again
          cdEl.textContent = 'Failed — try again';
          setTimeout(()=>{
            cdEl.textContent = '';
            setButtonDisabled(i, false);
          }, 900);
        } else {
          // success
          cdEl.textContent = '';
          setButtonAsCompleted(i);
        }
      }
    },1000);
  }

  // attach handlers
  for(let i=0;i<3;i++){
    const btn = document.getElementById('btn-'+i);
    btn.addEventListener('click', onActionClick);
  }

  // final button behavior
  const finalBtn = document.getElementById('final-btn');
  finalBtn.addEventListener('click', function(){
    if(!finalBtn.classList.contains('enabled')) return;
    // open skibidi.com in new tab
    window.open(FINAL_URL, '_blank');
  });

  // initial progress render
  updateProgress();

  // Accessibility: keyboard activation for final button when enabled
  finalBtn.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      finalBtn.click();
    }
  });

})();
</script>
</body>
</html>
